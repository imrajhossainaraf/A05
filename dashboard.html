<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Issue Tracker</title>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<nav class="h-[70px] relative w-full px-6 md:px-16 lg:px-24 xl:px-32 flex items-center justify-between z-20 bg-white shadow-[0px_4px_25px_0px_#0000000D] transition-all border-b border-gray-100">
   <div class="flex items-center gap-3">
        <!-- Reverted to the desired GitHub logo style -->
        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </div>
        <div>
            <h1 class="text-xl font-bold leading-tight">All Issues</h1>
            <p class="text-xs text-gray-500">Track and manage your project issues</p>
        </div>
    </div>

    <!-- Connected Search Input -->
    <div class="flex items-center border pr-3 gap-2 bg-gray-50 border-gray-200 h-[46px] rounded-lg overflow-hidden max-w-md w-full focus-within:ring-2 ring-purple-500 focus-within:bg-white transition-all">
        <input id="searchInput" type="text" placeholder="Search issues..." class="w-full h-full pl-5 outline-none bg-transparent text-gray-700 placeholder-gray-400 text-sm">
        <button id="searchBtn" type="button" class="text-gray-400 hover:text-purple-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 30 30" fill="currentColor">
                <path d="M13 3C7.489 3 3 7.489 3 13s4.489 10 10 10a9.95 9.95 0 0 0 6.322-2.264l5.971 5.971a1 1 0 1 0 1.414-1.414l-5.97-5.97A9.95 9.95 0 0 0 23 13c0-5.511-4.489-10-10-10m0 2c4.43 0 8 3.57 8 8s-3.57 8-8 8-8-3.57-8-8 3.57-8 8-8"/>
            </svg>
        </button>
    </div>

    <!-- Added ID here -->
    <button id="newIssueBtn" type="button" class="bg-purple-600 text-white font-medium md:inline hidden text-sm hover:bg-purple-700 active:scale-95 transition-all px-6 h-10 rounded-lg shadow-sm">
      + New Issue
    </button>
</nav>

<!-- Main container for issues -->
<div id="x" class="max-w-[1600px] mx-auto min-h-screen">
    <!-- Filters and Grid will be injected here by JS -->
</div>

<!-- Modal Container for Viewing Single Issue -->
<div id="issueModal" class="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 overflow-hidden transform scale-95 transition-transform duration-300 relative flex flex-col max-h-[90vh]" id="modalContent">
        <!-- Content will be injected here -->
    </div>
</div>

<!-- Modal Container for Creating New Issue -->
<div id="createIssueModal" class="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden transform scale-95 transition-transform duration-300 relative flex flex-col max-h-[90vh]" id="createModalContent">
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                <svg class="w-5 h-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Create New Issue
            </h2>
            <button id="closeCreateModalBtn" class="text-gray-400 hover:text-gray-700 transition-colors p-1 bg-white hover:bg-gray-100 rounded-lg border border-gray-200 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <form id="createIssueForm" class="p-6 overflow-y-auto">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                    <input type="text" id="newIssueTitle" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all placeholder-gray-400 text-sm" placeholder="e.g., Fix login button styling">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                    <textarea id="newIssueDescription" required rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all placeholder-gray-400 text-sm resize-none" placeholder="Provide details about this issue..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                        <select id="newIssuePriority" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all text-sm bg-white">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Author Name *</label>
                        <input type="text" id="newIssueAuthor" required value="guest_user" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all text-sm">
                    </div>
                </div>
            </div>
            
            <div id="createIssueError" class="mt-4 text-red-500 text-sm hidden bg-red-50 p-3 rounded-lg border border-red-100"></div>
            
            <div class="mt-8 flex justify-end gap-3 pt-4 border-t border-gray-100">
                <button type="button" id="cancelCreateBtn" class="px-5 py-2 rounded-lg text-gray-600 font-medium hover:bg-gray-100 transition-colors border border-transparent hover:border-gray-200">Cancel</button>
                <button type="submit" id="submitCreateBtn" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition-colors shadow-sm flex items-center justify-center min-w-[120px]">
                    Create Issue
                </button>
            </div>
        </form>
    </div>
</div>

<script src="script/dashboard.js"></script>   
</body>
</html>
